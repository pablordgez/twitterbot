[tool.ruff]
line-length = 100
target-version = "py312"
exclude = ["get-pip.py"]

[tool.ruff.lint]
select = ["E", "F", "W"]
ignore = ["E501"]

[tool.ruff.lint.per-file-ignores]
"**/migrations/*.py" = ["E501", "F401"]
"**/tests/*.py" = ["E501", "F841", "E722"]
"twitterbot/settings.py" = ["E402"]
"core/services/csv_import.py" = ["F841"]
"core/views/tweet_entries.py" = ["F841"]

[tool.ruff.format]
quote-style = "single"
