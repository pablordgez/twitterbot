{% extends "base.html" %}

{% block title %}Edit Tweet Entry{% endblock %}

{% block content %}
<div class="page-header d-print-none">
    <div class="container-xl">
        <div class="row g-2 align-items-center">
            <div class="col">
                <h2 class="page-title">
                    Edit Tweet Entry
                </h2>
            </div>
        </div>
    </div>
</div>

<div class="page-body">
    <div class="container-xl">
        <div class="row row-cards">
            <div class="col-12">
                <div class="card">
                    <div class="card-body">
                        <form method="post">
                            {% csrf_token %}
                            <div class="mb-3">
                                <label class="form-label">Content</label>
                                {{ form.text }}
                                {% if form.text.errors %}
                                <div class="invalid-feedback d-block">
                                    {{ form.text.errors }}
                                </div>
                                {% endif %}
                            </div>
                            <div class="form-footer">
                                <button type="submit" class="btn btn-primary">Save Changes</button>
                                <a href="{% url 'core:tweet_list_detail' object.list.pk %}" class="btn btn-link">Cancel</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
