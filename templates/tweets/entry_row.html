<tr id="entry-{{ entry.id }}">
    <td data-label="Content">
        <div class="text-wrap" style="white-space: pre-wrap;">{{ entry.text }}</div>
        {% if is_duplicate %}
        <div class="badge bg-warning-lt mt-1">Duplicate Entry</div>
        {% endif %}
    </td>
    <td data-label="Created" class="text-muted">
        {{ entry.created_at|date:"Y-m-d H:i" }}
    </td>
    <td>
        <div class="btn-list flex-nowrap">
            <a href="{% url 'core:tweet_entry_update' entry.pk %}" class="btn btn-icon btn-ghost-primary" title="Edit">
                <svg xmlns="http://www.w3.org/2000/svg" class="icon" width="24" height="24" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" fill="none" stroke-linecap="round" stroke-linejoin="round"><path stroke="none" d="M0 0h24v24H0z" fill="none"/><path d="M4 20h4l10.5 -10.5a2.828 2.828 0 1 0 -4 -4l-10.5 10.5v4" /><path d="M13.5 6.5l4 4" /></svg>
            </a>
            <button class="btn btn-icon btn-ghost-danger" 
                    title="Delete"
                    hx-post="{% url 'core:tweet_entry_delete' entry.pk %}"
                    hx-confirm="Delete this entry?"
                    hx-target="#entry-{{ entry.id }}"
                    hx-swap="outerHTML">
                <svg xmlns="http://www.w3.org/2000/svg" class="icon" width="24" height="24" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" fill="none" stroke-linecap="round" stroke-linejoin="round"><path stroke="none" d="M0 0h24v24H0z" fill="none"/><path d="M4 7l16 0" /><path d="M10 11l0 6" /><path d="M14 11l0 6" /><path d="M5 7l1 12a2 2 0 0 0 2 2h8a2 2 0 0 0 2 -2l1 -12" /><path d="M9 7v-3a1 1 0 0 1 1 -1h4a1 1 0 0 1 1 1v3" /></svg>
            </button>
        </div>
    </td>
</tr>
